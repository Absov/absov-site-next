var PlayItem = 0;


  function WritePlaylist(MyList, MyNum, MyNum2) {

    const Player01 = document.getElementById('Player01');
    const MyNote = document.getElementById('Note01');

    MyList.forEach(function(item, i, arr) {

      document.write('<LI>');
      document.write('<a href="##" id="link' + MyNum + i + '"><b>');
      document.write(item['title']);
      document.write('</b>');
      if (item['author'] != '-') {
        document.write(' - музыка: '); 
        document.write(item['author']);      
      };
      document.write(' - поёт '); 
      document.write(item['artist']);      

      document.write('</a>');
      document.write('</LI>');
      var MyLink = item['link'];
      var MyLink2;
      if (item['type'] == 'dropbox') {
        MyLink += '&raw=1';
      };

      if(i < arr.length - 1) {
        MyLink2 = arr[i+1]['link'];
        if (arr[i+1]['type'] == 'dropbox') {
            MyLink2 += '&raw=1';
        };

      } else {
        MyLink2 = "";
      }

      const MyHref = document.getElementById('link' + MyNum + i);
      MyHref.onclick = (e) => {
        var CurNote = 'Играет: <b>' + item['title'] +'</b> - поёт '+ item['artist'];
        /* var CurNote = 'Играет: <b>' + item['title'] + '</b>'; */
        Player01.src = MyLink; 
        MyNote.innerHTML = CurNote;
        Player01.play();

        const MyHref2 = document.getElementById('link' + MyNum + (i + 1));
            if(MyHref2 !== null) {
                Player01.onended = (e) => {
                    MyHref2.onclick();
                };
            } else if (MyNum2 > 0) {
                const MyHref2 = document.getElementById('link' + MyNum2 + 0);
                if(MyHref2 !== null) {
                    Player01.onended = (e) => {
                        MyHref2.onclick();
                    };
                } else {
                    Player01.onended = (e) => {
                    };
                };

            } else {
                Player01.onended = (e) => {
                };
            }

      };

      
    });


  }
